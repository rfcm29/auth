<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>New Transaction — FelicAuth</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">FelicAuth</a>
    <div class="navbar-nav">
        <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
        <a class="nav-link" th:href="@{/profile}">Profile</a>
        <a class="nav-link active" th:href="@{/transactions}">Transactions</a>
        <span class="nav-link" style="color:#1e293b; font-weight:600;"
              sec:authentication="principal.username">User</span>
        <form th:action="@{/logout}" method="post" style="margin:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</nav>

<div class="page-wrapper">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <p class="page-title">Create New Transaction</p>
        <a th:href="@{/transactions}" class="nav-link">← Back to Transactions</a>
    </div>

    <!-- Error Messages -->
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Transaction Form -->
    <div class="card" style="max-width:600px;">
        <form th:action="@{/transactions/new}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" class="form-control" required>
                    <option value="">Select category</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.name()}"
                            th:text="${cat.name()}">CATEGORY</option>
                </select>
            </div>

            <div class="form-group">
                <label for="amount">Amount *</label>
                <input type="number" id="amount" name="amount" class="form-control"
                       step="0.01" min="0.01" placeholder="100.00" required/>
            </div>

            <div class="form-group">
                <label for="currency">Currency *</label>
                <input type="text" id="currency" name="currency" class="form-control"
                       maxlength="3" pattern="[A-Z]{3}" placeholder="USD" required
                       style="text-transform:uppercase;"/>
                <small style="font-size:.8rem; color:var(--muted); margin-top:.25rem; display:block;">
                    3-letter ISO currency code (e.g., USD, EUR, GBP)
                </small>
            </div>

            <div class="form-group">
                <label for="transactionDate">Transaction Date *</label>
                <input type="date" id="transactionDate" name="transactionDate"
                       class="form-control" required max="" />
            </div>

            <div class="form-group">
                <label for="referenceId">Reference ID *</label>
                <input type="text" id="referenceId" name="referenceId" class="form-control"
                       placeholder="TXN-2024-001" required/>
                <small style="font-size:.8rem; color:var(--muted); margin-top:.25rem; display:block;">
                    A unique identifier for this transaction
                </small>
            </div>

            <div class="form-group">
                <label for="parties">Parties Involved *</label>
                <input type="text" id="parties" name="parties" class="form-control"
                       placeholder="John Doe, ABC Corp" required/>
                <small style="font-size:.8rem; color:var(--muted); margin-top:.25rem; display:block;">
                    Names of parties involved in the transaction
                </small>
            </div>

            <button type="submit" class="btn-primary">Create Transaction</button>
        </form>
    </div>
</div>

<script>
    // Set max date to today for transaction date
    document.getElementById('transactionDate').max = new Date().toISOString().split('T')[0];

    // Auto-uppercase currency input
    document.getElementById('currency').addEventListener('input', function(e) {
        e.target.value = e.target.value.toUpperCase();
    });
</script>

</body>
</html>
