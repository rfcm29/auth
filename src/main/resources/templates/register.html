<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — FelicAuth</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">FelicAuth</a>
    <div class="navbar-nav">
        <a class="nav-link" th:href="@{/web/login}">Login</a>
        <a class="btn-nav active" th:href="@{/web/register}">Register</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Create account</h1>
        <p class="subtitle">Join FelicAuth — it only takes a second</p>

        <!-- Error message -->
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/web/register}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="name">Full name</label>
                <input id="name" type="text" name="name" class="form-control"
                       placeholder="John Doe" autocomplete="name" required/>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" name="email" class="form-control"
                       placeholder="you@example.com" autocomplete="email" required/>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" class="form-control"
                       placeholder="Min. 8 characters" autocomplete="new-password" minlength="8" required/>
            </div>

            <button type="submit" class="btn-primary">Create account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/web/login}">Sign in</a>
        </div>
    </div>
</div>

</body>
</html>
