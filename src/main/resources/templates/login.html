<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — FelicAuth</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/}">FelicAuth</a>
    <div class="navbar-nav">
        <a class="nav-link active" th:href="@{/web/login}">Login</a>
        <a class="btn-nav" th:href="@{/web/register}">Register</a>
    </div>
</nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your account to continue</p>

        <!-- Success / logout message -->
        <div class="alert alert-success" th:if="${logoutMessage}" th:text="${logoutMessage}"></div>

        <!-- Error message -->
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <div class="alert alert-danger" th:if="${param.error}">Invalid email or password.</div>

        <form th:action="@{/web/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" name="email" class="form-control"
                       placeholder="you@example.com" autocomplete="email" required/>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" class="form-control"
                       placeholder="••••••••" autocomplete="current-password" required/>
            </div>

            <button type="submit" class="btn-primary">Sign in</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a th:href="@{/web/register}">Create one</a>
        </div>
    </div>
</div>

</body>
</html>
